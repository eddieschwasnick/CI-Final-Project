# config.yaml
api_key_path: ".env"
random_seed: 42

stock_universe:
  - AAPL
  - MSFT
  - GOOGL
  - JNJ
  - UNH
  - PFE
  - JPM
  - GS
  - XOM
  - CVX
  - PG
  - KO
  - CAT
  - HON
  - AMZN
  - NVDA
  - V
  - LLY
  - BA
  - MMM

# LLM settings
# To use Anthropic directly:   model: "claude-sonnet-4-6"
# To use LiteLLM + OpenAI:    model: "gpt-4o"
# To use LiteLLM + Gemini:    model: "gemini/gemini-1.5-pro"
# LiteLLM is used for all calls — it routes Anthropic models too.
model: "claude-sonnet-4-6"
temperature: 0.7
max_tokens: 2048

# Experiment settings
runs_per_condition: 30    # target 30–50; start with 5 for a pilot
max_retries: 3            # retry attempts per run if parsing fails
sleep_between_calls: 2    # seconds between API calls (rate limit safety)

# Paths
prompts_dir: "./prompts"
outputs_dir: "./outputs"

